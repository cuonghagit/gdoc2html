<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>gdoc2html — Google Doc → Clean HTML</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         max-width: 800px; margin: 20px auto; padding: 0 20px; color: #222;
         background: #f5f5f5; }
  h1 { margin: 0 0 4px 0; font-size: 22px; }
  h1 small { font-size: 13px; color: #666; font-weight: 400; }
  .card { background: #fff; border: 1px solid #ddd; border-radius: 8px;
          padding: 20px 24px; margin-bottom: 14px; }
  label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
  .input-row { display: flex; gap: 10px; }
  .input-row input { flex: 1; padding: 9px 12px; border: 1px solid #ccc;
                     border-radius: 4px; font-size: 14px; }
  .input-row input:focus { outline: none; border-color: #1a73e8;
                           box-shadow: 0 0 0 2px rgba(26,115,232,0.15); }
  button { padding: 9px 22px; border: 1px solid #ccc; background: #fafafa;
           border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; }
  button:hover { background: #eee; }
  button.primary { background: #1a73e8; color: white; border-color: #1a73e8; }
  button.primary:hover { background: #1557b0; }
  button.primary:disabled { background: #99c4f5; border-color: #99c4f5; cursor: not-allowed; }
  button.success { background: #0f9d58; color: white; border-color: #0f9d58; }
  #log { background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 4px;
         font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px;
         max-height: 250px; overflow-y: auto; white-space: pre-wrap; margin: 0; }
  .stat { display: inline-block; background: #e8f0fe; border-radius: 4px;
          padding: 3px 10px; margin: 2px; font-size: 12px; }
  .result-box { margin-top: 12px; }
  .result-box .card { padding: 14px 16px; }
  .result-box .card.b { background: #d4edda; border-color: #c3e6cb; }
  .result-box .card.w { background: #fff3cd; border-color: #ffeeba; color: #856404; }
  .result-box .card.e { background: #f8d7da; border-color: #f5c6cb; color: #721c24; }
  .img-icons { margin: 8px 0 0; font-size: 12px; line-height: 1.8; }
  .error-box { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24;
               padding: 10px 14px; border-radius: 6px; margin-top: 10px; display: none; }
  @media (max-width:500px) { .input-row { flex-direction: column; } }
</style>
</head>
<body>

<h1>gdoc2html <small>Google Doc → Clean HTML (base64 inline)</small></h1>

<div class="card">
  <label>Google Doc URL (published)</label>
  <div class="input-row">
    <input type="url" id="url-input" placeholder="https://docs.google.com/document/d/e/.../pub" autofocus>
    <button id="fetch-btn" class="primary">▶ Fetch</button>
  </div>
  <div id="error-msg" class="error-box"></div>
</div>

<div class="card" style="padding:12px 16px">
  <label style="margin:0 0 4px">Log</label>
  <div id="log">(paste URL → Fetch)</div>
</div>

<div id="result-area" style="display:none"></div>

<script>
(function(){
  const $ = id => document.getElementById(id);
  const logEl = $('log');

  function log(text) {
    logEl.textContent += text + '\n';
    logEl.scrollTop = logEl.scrollHeight;
  }

  function esc(s) {
    if (typeof s !== 'string') s = String(s);
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  $('fetch-btn').onclick = async () => {
    const url = $('url-input').value.trim();
    if (!url) { alert('Nhập URL'); return; }

    const btn = $('fetch-btn');
    btn.disabled = true;
    btn.textContent = '⏳ Fetch & inline ảnh...';
    $('result-area').style.display = 'none';
    logEl.textContent = '';
    $('error-msg').style.display = 'none';

    log('[fetch] ' + url);

    try {
      const r = await fetch('/api/fetch', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({url}),
      });
      const j = await r.json();

      if (!r.ok || !j.ok) {
        $('error-msg').textContent = j.detail || JSON.stringify(j);
        $('error-msg').style.display = '';
        return;
      }

      (j.log || []).forEach(l => log(l));

      // Build result card
      let html = `<div class="result-box">
        <div class="card b">
          <b>✓ Xong!</b> HTML ~${j.out_size_kb} KB
          <div style="margin-top:6px">
            <span class="stat">📄 ${esc(j.short_id)}</span>
            <span class="stat">🟢 ${j.imgs_inlined} ảnh inline</span>
            ${j.imgs_kept_lh3 ? `<span class="stat">🔗 ${j.imgs_kept_lh3} ảnh lh3</span>` : ''}
            ${j.imgs_failed ? `<span class="stat">⚠ ${j.imgs_failed} fail</span>` : ''}
          </div>
          <p style="margin:10px 0 0;font-size:13px;color:#555">
            File HTML tự chứa tất cả ảnh — mở offline vẫn thấy ảnh.
          </p>
          <button id="dl-btn" class="success" style="margin-top:10px"
            onclick="downloadHtml()">
            ⬇ Download HTML (${j.out_size_kb} KB)
          </button>
        </div>`;

      if (j.imgs_failed > 0) {
        html += `<div class="card w">
          ⚠ ${j.imgs_failed} ảnh không tải được (có thể Google block).
          Một số ảnh sẽ bị thiếu trong HTML.
        </div>`;
      }

      html += `<div class="card" style="margin-top:10px">
        <details>
          <summary style="font-size:13px">👁 Preview HTML (${j.out_size_kb} KB)</summary>
          <iframe id="preview" srcdoc="${esc(j.html)}"
            style="width:100%;min-height:400px;border:1px solid #ddd;border-radius:4px;margin-top:8px"></iframe>
        </details>
      </div></div>`;

      $('result-area').innerHTML = html;
      $('result-area').style.display = '';

      // Store HTML for download
      window.__gdocHtml = j.html;
      window.__gdocShortId = j.short_id;

    } catch (err) {
      $('error-msg').textContent = String(err);
      $('error-msg').style.display = '';
      log('ERROR: ' + String(err));
    } finally {
      btn.disabled = false;
      btn.textContent = '▶ Fetch';
    }
  };

  function downloadHtml() {
    const html = window.__gdocHtml;
    const shortId = window.__gdocShortId || 'output';
    if (!html) { alert('Chưa có dữ liệu. Fetch trước đã.'); return; }
    const blob = new Blob([html], {type: 'text/html;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `gdoc2html_${shortId}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }

  window.downloadHtml = downloadHtml;

  // Enter key
  $('url-input').onkeydown = e => { if (e.key === 'Enter') $('fetch-btn').click(); };
})();
</script>

<footer style="text-align:center;font-size:11px;color:#aaa;margin:30px 0">
  Ảnh được inline base64 — không cần Drive, không cần API key
</footer>
</body>
</html>
